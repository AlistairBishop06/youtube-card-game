<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register — Video Gacha</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page page--narrow">
      <nav id="siteNav" class="site-nav" aria-label="Main"></nav>

      <header class="header">
        <h1 class="header__title">Create account</h1>
        <p class="header__tagline">
          Username: 3–32 characters (letters, numbers, underscore). Password: at least 8 characters.
        </p>
      </header>

      <main class="main">
        <section class="panel">
          <form id="registerForm" class="login-form">
            <label class="login-form__label" for="username">Username</label>
            <input
              class="login-form__input"
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              maxlength="32"
              required
            />
            <label class="login-form__label" for="password">Password</label>
            <input
              class="login-form__input"
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              minlength="8"
              required
            />
            <label class="login-form__label" for="password2">Confirm password</label>
            <input
              class="login-form__input"
              id="password2"
              name="password2"
              type="password"
              autocomplete="new-password"
              minlength="8"
              required
            />
            <button type="submit" class="btn btn--pull login-form__submit">Register</button>
          </form>
          <p class="error login-form__error" id="registerError" role="alert" hidden></p>
          <p class="panel__text" style="margin-top: 1rem">
            Already have an account? <a href="login.html">Log in</a>
          </p>
        </section>
      </main>
    </div>

    <script type="module" src="js/app-register.js"></script>
  </body>
</html>
