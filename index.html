<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Gacha</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1 class="header__title">Video Gacha</h1>
        <p class="header__tagline">Pull random YouTube videos and collect them as cards.</p>
        <dl class="stats" aria-live="polite">
          <div class="stats__item">
            <dt>Total cards</dt>
            <dd id="statTotal">0</dd>
          </div>
          <div class="stats__item">
            <dt>Unique videos</dt>
            <dd id="statUnique">0</dd>
          </div>
        </dl>
      </header>

      <main class="main">
        <section class="panel panel--pull" id="pullSection" aria-labelledby="pull-heading">
          <h2 id="pull-heading" class="panel__title">Pull</h2>
          <p class="panel__text">
            Uses the YouTube Data API. Set your browser API key in
            <code>js/config.js</code>, then serve this folder over HTTP (not <code>file://</code>).
            After a pull, slice open the pack to reveal your card.
          </p>
          <div class="pull-row">
            <button type="button" class="btn btn--pull" id="pullBtn">Open pack</button>
            <div class="loading" id="loading" hidden aria-hidden="true">
              <span class="loading__spinner" aria-hidden="true"></span>
              <span class="loading__text">Drawing…</span>
            </div>
          </div>
          <p class="error" id="errorBox" role="alert" hidden></p>
          <div class="reveal-host" id="revealHost"></div>
        </section>

        <section class="panel panel--collection" aria-labelledby="collection-heading">
          <h2 id="collection-heading" class="panel__title">Collection</h2>
          <div class="collection-grid" id="collectionGrid"></div>
        </section>
      </main>
    </div>

    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Card details" hidden>
      <div class="modal__backdrop"></div>
      <div class="modal__dialog">
        <button type="button" class="modal__close" id="modalClose" aria-label="Close">
          ×
        </button>
        <div class="modal__body" id="modalBody"></div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
