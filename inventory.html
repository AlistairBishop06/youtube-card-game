<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inventory — Video Gacha</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <nav id="siteNav" class="site-nav" aria-label="Main"></nav>

      <header class="header">
        <h1 class="header__title">Inventory</h1>
        <p class="header__tagline">Every card you’ve collected for this account.</p>
        <dl class="stats" aria-live="polite">
          <div class="stats__item">
            <dt>Total cards</dt>
            <dd id="statTotal">0</dd>
          </div>
          <div class="stats__item">
            <dt>Unique videos</dt>
            <dd id="statUnique">0</dd>
          </div>
        </dl>
      </header>

      <main class="main">
        <section class="panel panel--collection" aria-labelledby="inv-heading">
          <h2 id="inv-heading" class="panel__title">Collection</h2>
          <div class="collection-grid" id="collectionGrid"></div>
        </section>
      </main>
    </div>

    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Card details" hidden>
      <div class="modal__backdrop"></div>
      <div class="modal__dialog">
        <button type="button" class="modal__close" id="modalClose" aria-label="Close">×</button>
        <div class="modal__body" id="modalBody"></div>
      </div>
    </div>

    <script type="module" src="js/app-inventory.js"></script>
  </body>
</html>
